<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WPM Tracker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f5f5f3;
    color: #1a1a1a;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 1.5rem 1rem;
  }
  .container {
    background: #fff;
    border-radius: 12px;
    border: 1px solid #e0e0dc;
    padding: 1.5rem;
    width: 100%;
    max-width: 680px;
  }
  h1 { font-size: 18px; font-weight: 500; margin-bottom: 1.2rem; }

  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 1.2rem;
  }
  .stat {
    background: #f5f5f3;
    border-radius: 8px;
    padding: 0.8rem;
    text-align: center;
  }
  .stat-label { font-size: 11px; color: #888; margin-bottom: 4px; }
  .stat-value { font-size: 28px; font-weight: 500; color: #1a1a1a; line-height: 1.2; }
  .stat-value.accent { color: #1a6ef7; }
  .stat-unit { font-size: 11px; color: #aaa; margin-top: 2px; }

  textarea {
    width: 100%;
    min-height: 180px;
    resize: vertical;
    font-size: 15px;
    line-height: 1.7;
    border: 1px solid #e0e0dc;
    border-radius: 8px;
    padding: 12px;
    font-family: inherit;
    color: #1a1a1a;
    background: #fff;
    outline: none;
    -webkit-appearance: none;
  }
  textarea:focus { border-color: #1a6ef7; }
  textarea:disabled { background: #f5f5f3; color: #555; }

  .actions { display: flex; gap: 10px; margin-top: 1rem; }

  .btn-start {
    background: #1a6ef7;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 14px 28px;
    font-size: 16px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
    -webkit-appearance: none;
    touch-action: manipulation;
    min-height: 48px;
  }
  .btn-start:active { background: #1055c4; }

  .btn-reset {
    background: transparent;
    color: #666;
    border: 1px solid #d0d0cc;
    border-radius: 8px;
    padding: 14px 20px;
    font-size: 15px;
    cursor: pointer;
    font-family: inherit;
    -webkit-appearance: none;
    touch-action: manipulation;
    min-height: 48px;
  }
  .btn-reset:active { background: #f0f0ee; }

  .status { font-size: 13px; color: #888; margin-top: 10px; min-height: 20px; }

  .result-banner {
    display: none;
    background: #eef4ff;
    border: 1px solid #c0d8ff;
    border-radius: 8px;
    padding: 12px 16px;
    margin-top: 1rem;
    font-size: 14px;
    color: #1a4ea0;
  }
  .result-banner.show { display: block; }
</style>
</head>
<body>
<div class="container">
  <h1>WPM Tracker</h1>

  <div class="stats">
    <div class="stat">
      <div class="stat-label">単語数</div>
      <div class="stat-value" id="word-count">0</div>
      <div class="stat-unit">words</div>
    </div>
    <div class="stat">
      <div class="stat-label">経過時間</div>
      <div class="stat-value" id="timer-val">0:00</div>
      <div class="stat-unit">min : sec</div>
    </div>
    <div class="stat">
      <div class="stat-label">WPM</div>
      <div class="stat-value" id="wpm-val">—</div>
      <div class="stat-unit">words / min</div>
    </div>
  </div>

  <textarea id="text-input" placeholder="英文をここにペーストしてください。単語数が自動でカウントされます。"></textarea>

  <div class="actions">
    <button id="main-btn" class="btn-start">▶ Start</button>
    <button id="reset-btn" class="btn-reset">Reset</button>
  </div>

  <div class="status" id="status">テキストをペーストして Start を押してください</div>
  <div class="result-banner" id="result-banner"></div>
</div>

<script>
  var timerInterval = null;
  var startTime = null;
  var elapsedSeconds = 0;
  var running = false;

  var textInput = document.getElementById('text-input');
  var wordCountEl = document.getElementById('word-count');
  var timerEl = document.getElementById('timer-val');
  var wpmEl = document.getElementById('wpm-val');
  var mainBtn = document.getElementById('main-btn');
  var resetBtn = document.getElementById('reset-btn');
  var statusEl = document.getElementById('status');
  var resultBanner = document.getElementById('result-banner');

  textInput.addEventListener('input', updateWordCount);

  function countWords(text) {
    var trimmed = text.trim();
    if (!trimmed) return 0;
    return trimmed.split(/\s+/).filter(function(w) { return w.length > 0; }).length;
  }

  function updateWordCount() {
    var count = countWords(textInput.value);
    wordCountEl.textContent = count;
    if (!running) {
      wpmEl.textContent = '—';
      wpmEl.classList.remove('accent');
    }
  }

  function formatTime(secs) {
    var m = Math.floor(secs / 60);
    var s = secs % 60;
    return m + ':' + (s < 10 ? '0' : '') + s;
  }

  function handleMain() {
    if (!running) {
      var words = countWords(textInput.value);
      if (words === 0) {
        statusEl.textContent = 'テキストをペーストしてから Start を押してください';
        return;
      }
      running = true;
      elapsedSeconds = 0;
      startTime = Date.now();
      mainBtn.textContent = '■ Stop';
      textInput.disabled = true;
      resultBanner.classList.remove('show');
      statusEl.textContent = '読んでいます… 読み終わったら Stop を押してください';
      timerInterval = setInterval(function() {
        elapsedSeconds = Math.floor((Date.now() - startTime) / 1000);
        timerEl.textContent = formatTime(elapsedSeconds);
      }, 500);
    } else {
      clearInterval(timerInterval);
      running = false;
      mainBtn.textContent = '▶ Start';
      textInput.disabled = false;
      if (elapsedSeconds > 0) {
        var words = countWords(textInput.value);
        var minutes = elapsedSeconds / 60;
        var wpm = Math.round(words / minutes);
        wpmEl.textContent = wpm;
        wpmEl.classList.add('accent');
        statusEl.textContent = '完了！';
        resultBanner.textContent = words + ' 語を ' + formatTime(elapsedSeconds) + ' で読みました（' + wpm + ' WPM）';
        resultBanner.classList.add('show');
      } else {
        statusEl.textContent = '時間を計測できませんでした';
      }
    }
  }

  function handleReset() {
    clearInterval(timerInterval);
    running = false;
    elapsedSeconds = 0;
    startTime = null;
    textInput.disabled = false;
    textInput.value = '';
    wordCountEl.textContent = '0';
    timerEl.textContent = '0:00';
    wpmEl.textContent = '—';
    wpmEl.classList.remove('accent');
    mainBtn.textContent = '▶ Start';
    statusEl.textContent = 'テキストをペーストして Start を押してください';
    resultBanner.classList.remove('show');
  }

  // タッチとクリック両対応
  mainBtn.addEventListener('touchend', function(e) {
    e.preventDefault();
    handleMain();
  });
  mainBtn.addEventListener('click', function(e) {
    handleMain();
  });

  resetBtn.addEventListener('touchend', function(e) {
    e.preventDefault();
    handleReset();
  });
  resetBtn.addEventListener('click', function(e) {
    handleReset();
  });
</script>
</body>
</html>
