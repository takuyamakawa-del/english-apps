<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Text Reader</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f5f5f3;
    color: #1a1a1a;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 1.5rem 1rem;
  }
  .container {
    background: #fff;
    border-radius: 12px;
    border: 1px solid #e0e0dc;
    padding: 1.5rem;
    width: 100%;
    max-width: 680px;
  }
  h1 { font-size: 18px; font-weight: 500; margin-bottom: 1.2rem; }

  textarea {
    width: 100%;
    min-height: 220px;
    resize: vertical;
    font-size: 15px;
    line-height: 1.7;
    border: 1px solid #e0e0dc;
    border-radius: 8px;
    padding: 12px;
    font-family: inherit;
    color: #1a1a1a;
    background: #fff;
    outline: none;
    -webkit-appearance: none;
  }
  textarea:focus { border-color: #1a6ef7; }

  /* 読み上げ表示エリア */
  .reader-view {
    display: none;
    border: 1px solid #e0e0dc;
    border-radius: 8px;
    padding: 16px;
    min-height: 220px;
    font-size: 17px;
    line-height: 2.0;
    color: #333;
    background: #fff;
    max-height: 50vh;
    overflow-y: auto;
  }
  .reader-view.show { display: block; }

  .sentence { border-radius: 4px; }
  .sentence.active { background: #fff3d6; }

  .word {
    cursor: pointer;
    border-radius: 3px;
    padding: 0 1px;
  }
  .word:hover { background: #e0ecff; }
  .word.active {
    background: #1a6ef7;
    color: #fff;
  }

  .speed-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 1.25rem;
  }
  .speed-label { font-size: 13px; color: #888; white-space: nowrap; }
  input[type=range] { flex: 1; accent-color: #1a6ef7; height: 4px; cursor: pointer; }
  .speed-value { font-size: 14px; font-weight: 500; min-width: 36px; text-align: right; }

  .actions { display: flex; gap: 10px; margin-top: 1.25rem; flex-wrap: wrap; }
  .btn {
    border-radius: 8px;
    padding: 12px 24px;
    font-size: 15px;
    cursor: pointer;
    font-family: inherit;
    border: none;
    -webkit-appearance: none;
    touch-action: manipulation;
    min-height: 46px;
  }
  .btn-primary { background: #1a6ef7; color: #fff; font-weight: 500; }
  .btn-primary:active { background: #1055c4; }
  .btn-outline { background: transparent; color: #666; border: 1px solid #d0d0cc; }
  .btn-outline:active { background: #f0f0ee; }

  .status { font-size: 13px; color: #888; margin-top: 10px; min-height: 20px; }
  .key-hint { font-size: 12px; color: #bbb; margin-top: 6px; }
  .key-hint kbd {
    background: #f0f0ee;
    border: 1px solid #d0d0cc;
    border-radius: 4px;
    padding: 1px 6px;
    font-size: 12px;
    font-family: inherit;
    color: #666;
  }
</style>
</head>
<body>
<div class="container">
  <h1>Text Reader</h1>

  <!-- 入力モード -->
  <textarea id="text-input" placeholder="読み上げたいテキストをここにペーストしてください。"></textarea>

  <!-- 読み上げモード -->
  <div class="reader-view" id="reader-view"></div>

  <div class="speed-row">
    <span class="speed-label">再生速度</span>
    <input type="range" id="speed-slider" min="0.5" max="2" step="0.1" value="1">
    <span class="speed-value" id="speed-val">1.0x</span>
  </div>

  <div class="actions" id="input-actions">
    <button class="btn btn-primary" id="mode-btn">📖 読み上げモード開始</button>
    <button class="btn btn-outline" id="clear-btn">🗑 Reset</button>
  </div>

  <div class="actions" id="reader-actions" style="display:none;">
    <button class="btn btn-primary" id="play-btn">▶ 再生</button>
    <button class="btn btn-outline" id="stop-btn">■ 停止</button>
    <button class="btn btn-outline" id="edit-btn">✎ テキスト編集に戻る</button>
  </div>

  <div class="status" id="status">テキストをペーストして「読み上げモード開始」を押してください</div>
  <div class="key-hint"><kbd>Space</kbd> キーで再生・停止（PC）／ 単語をタップするとその単語だけ読み上げます</div>
</div>

<script>
  var slider   = document.getElementById('speed-slider');
  var speedVal = document.getElementById('speed-val');
  var playBtn  = document.getElementById('play-btn');
  var stopBtn  = document.getElementById('stop-btn');
  var editBtn  = document.getElementById('edit-btn');
  var modeBtn  = document.getElementById('mode-btn');
  var clearBtn = document.getElementById('clear-btn');
  var statusEl = document.getElementById('status');
  var textInput = document.getElementById('text-input');
  var readerView = document.getElementById('reader-view');
  var inputActions = document.getElementById('input-actions');
  var readerActions = document.getElementById('reader-actions');

  var sentences = [];      // [{text, words:[{word, el}], el}]
  var charMap = [];        // 文字位置 → {sentenceIdx, wordIdx}
  var fullText = '';
  var playing = false;

  slider.addEventListener('input', function() {
    speedVal.textContent = parseFloat(slider.value).toFixed(1) + 'x';
  });

  // ---------- モード切替 ----------
  function enterReaderMode() {
    var text = textInput.value.trim();
    if (!text) {
      statusEl.textContent = 'テキストをペーストしてから開始してください';
      return;
    }
    buildReaderView(text);
    textInput.style.display = 'none';
    readerView.classList.add('show');
    inputActions.style.display = 'none';
    readerActions.style.display = 'flex';
    statusEl.textContent = '再生ボタンで読み上げ開始。単語タップでその単語だけ読み上げます';
  }

  function exitReaderMode() {
    stopAll();
    textInput.style.display = '';
    readerView.classList.remove('show');
    inputActions.style.display = 'flex';
    readerActions.style.display = 'none';
    statusEl.textContent = 'テキストをペーストして「読み上げモード開始」を押してください';
  }

  // ---------- 表示構築 ----------
  function buildReaderView(text) {
    fullText = text;
    sentences = [];
    charMap = [];
    readerView.innerHTML = '';

    // センテンス分割（. ! ? の後で区切る）
    var sentenceRegex = /[^.!?]*[.!?]+["')\]]*\s*|[^.!?]+$/g;
    var rawSentences = text.match(sentenceRegex) || [text];

    var charPos = 0;
    rawSentences.forEach(function(sentText, sIdx) {
      if (!sentText.trim()) { charPos += sentText.length; return; }

      var sentSpan = document.createElement('span');
      sentSpan.className = 'sentence';

      var sentence = { text: sentText, words: [], el: sentSpan };

      // 単語分割（スペース区切り、スペースも保持）
      var parts = sentText.split(/(\s+)/);
      parts.forEach(function(part) {
        if (!part) return;
        if (/^\s+$/.test(part)) {
          sentSpan.appendChild(document.createTextNode(part));
          for (var i = 0; i < part.length; i++) {
            charMap[charPos + i] = null;
          }
          charPos += part.length;
        } else {
          var wordSpan = document.createElement('span');
          wordSpan.className = 'word';
          wordSpan.textContent = part;
          var wIdx = sentence.words.length;
          (function(si, wi, wordText) {
            wordSpan.addEventListener('click', function(e) {
              speakSingleWord(wordText, si, wi);
            });
          })(sIdx, wIdx, part);
          sentSpan.appendChild(wordSpan);
          sentence.words.push({ word: part, el: wordSpan });
          for (var i = 0; i < part.length; i++) {
            charMap[charPos + i] = { s: sentences.length, w: wIdx };
          }
          charPos += part.length;
        }
      });

      sentences.push(sentence);
      readerView.appendChild(sentSpan);
    });
  }

  // ---------- ハイライト ----------
  function clearHighlights() {
    sentences.forEach(function(s) {
      s.el.classList.remove('active');
      s.words.forEach(function(w) { w.el.classList.remove('active'); });
    });
  }

  function highlightAt(charIndex) {
    var loc = null;
    // charIndexがスペースの場合、次の単語を探す
    for (var i = charIndex; i < charMap.length; i++) {
      if (charMap[i]) { loc = charMap[i]; break; }
    }
    if (!loc) return;

    clearHighlights();
    var sent = sentences[loc.s];
    if (sent) {
      sent.el.classList.add('active');
      var word = sent.words[loc.w];
      if (word) {
        word.el.classList.add('active');
        // 自動スクロール
        var rect = word.el.getBoundingClientRect();
        var viewRect = readerView.getBoundingClientRect();
        if (rect.bottom > viewRect.bottom || rect.top < viewRect.top) {
          word.el.scrollIntoView({ block: 'center', behavior: 'smooth' });
        }
      }
    }
  }

  // ---------- 再生 ----------
  function playAll() {
    stopAll();
    if (!fullText) return;

    var utt = new SpeechSynthesisUtterance(fullText);
    utt.lang = 'en-US';
    utt.rate = parseFloat(slider.value);

    utt.onboundary = function(e) {
      if (e.name === 'word' || e.charIndex !== undefined) {
        highlightAt(e.charIndex);
      }
    };
    utt.onstart = function() {
      playing = true;
      playBtn.textContent = '▶ 再生中';
      statusEl.textContent = '読み上げ中…';
    };
    utt.onend = function() {
      playing = false;
      playBtn.textContent = '▶ 再生';
      clearHighlights();
      statusEl.textContent = '読み上げが完了しました';
    };
    utt.onerror = function() {
      playing = false;
      playBtn.textContent = '▶ 再生';
    };
    speechSynthesis.speak(utt);
  }

  function stopAll() {
    speechSynthesis.cancel();
    playing = false;
    playBtn.textContent = '▶ 再生';
    clearHighlights();
  }

  // ---------- 単語タップ ----------
  function speakSingleWord(word, sIdx, wIdx) {
    stopAll();
    // 記号を除去して発音
    var clean = word.replace(/^[^a-zA-Z0-9']+|[^a-zA-Z0-9']+$/g, '');
    if (!clean) return;

    clearHighlights();
    var sent = sentences[sIdx];
    if (sent) {
      sent.el.classList.add('active');
      if (sent.words[wIdx]) sent.words[wIdx].el.classList.add('active');
    }

    var utt = new SpeechSynthesisUtterance(clean);
    utt.lang = 'en-US';
    utt.rate = parseFloat(slider.value);
    utt.onend = function() {
      statusEl.textContent = '「' + clean + '」を読み上げました。再生ボタンで最初から再生できます';
    };
    speechSynthesis.speak(utt);
    statusEl.textContent = '「' + clean + '」を読み上げ中…';
  }

  // ---------- イベント ----------
  modeBtn.addEventListener('click', enterReaderMode);
  playBtn.addEventListener('click', playAll);
  stopBtn.addEventListener('click', function() {
    stopAll();
    statusEl.textContent = '停止しました';
  });
  editBtn.addEventListener('click', exitReaderMode);

  clearBtn.addEventListener('click', function() {
    if (textInput.value.trim() && !confirm('テキストを消去しますか？')) return;
    speechSynthesis.cancel();
    textInput.value = '';
    textInput.focus();
    statusEl.textContent = 'テキストをペーストして「読み上げモード開始」を押してください';
  });

  document.addEventListener('keydown', function(e) {
    if (e.code === 'Space' && e.target.tagName !== 'TEXTAREA') {
      e.preventDefault();
      if (speechSynthesis.speaking) {
        stopAll();
        statusEl.textContent = '停止しました';
      } else if (readerView.classList.contains('show')) {
        playAll();
      }
    }
  });
</script>
</body>
</html>
