<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>単語帳</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f5f5f3;
    color: #1a1a1a;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 2rem 1rem;
  }
  .container { width: 100%; max-width: 620px; }
  h1 { font-size: 18px; font-weight: 500; margin-bottom: 1.5rem; color: #1a1a1a; }

  .hint-box {
    background: #f0f5ff;
    border: 1px solid #c0d8ff;
    border-radius: 8px;
    padding: 12px 14px;
    font-size: 13px;
    color: #1a4ea0;
    margin-bottom: 1rem;
    line-height: 1.7;
  }

  .upload-area {
    background: #fff;
    border: 2px dashed #d0d0cc;
    border-radius: 12px;
    padding: 2rem;
    text-align: center;
    cursor: pointer;
    margin-bottom: 1rem;
    transition: border-color 0.2s;
  }
  .upload-area:hover { border-color: #1a6ef7; }
  .upload-area.dragover { border-color: #1a6ef7; background: #f0f5ff; }
  .upload-icon { font-size: 32px; margin-bottom: 8px; }
  .upload-text { font-size: 14px; color: #888; line-height: 1.6; }
  .upload-text strong { color: #1a1a1a; }
  input[type=file] { display: none; }

  .status-bar {
    display: none;
    background: #fff;
    border-radius: 8px;
    border: 1px solid #e0e0dc;
    padding: 10px 14px;
    font-size: 13px;
    color: #555;
    margin-bottom: 1.5rem;
    align-items: center;
    justify-content: space-between;
  }
  .status-bar.show { display: flex; }
  .word-count { font-weight: 500; color: #1a6ef7; }

  /* カードセクション */
  .card-section { display: none; }
  .card-section.show { display: block; }

  .progress-text {
    font-size: 13px;
    color: #888;
    text-align: center;
    margin-bottom: 12px;
  }

  .flashcard {
    background: #fff;
    border-radius: 12px;
    border: 1px solid #e0e0dc;
    padding: 1.5rem;
    margin-bottom: 1rem;
    cursor: pointer;
    transition: box-shadow 0.2s;
    position: relative;
    user-select: none;
  }
  .flashcard:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); }

  .card-side-label {
    font-size: 11px;
    color: #bbb;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .card-word {
    font-size: 34px;
    font-weight: 400;
    color: #1a1a1a;
    line-height: 1.3;
    margin-bottom: 6px;
  }

  .card-meaning {
    font-size: 22px;
    color: #1a6ef7;
    line-height: 1.4;
    display: none;
    margin-bottom: 12px;
  }

  .divider {
    border: none;
    border-top: 1px solid #e0e0dc;
    margin: 14px 0;
    display: none;
  }

  .card-sentence-wrap { display: none; }

  .card-sentence {
    font-size: 14px;
    color: #444;
    line-height: 1.7;
    margin-bottom: 10px;
  }

  .btn-speak {
    background: #f0f5ff;
    border: 1px solid #c0d8ff;
    border-radius: 6px;
    padding: 6px 14px;
    font-size: 13px;
    color: #1a4ea0;
    cursor: pointer;
    font-family: inherit;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .btn-speak:hover { background: #e0ecff; }
  .btn-speak.playing { background: #fff0e0; border-color: #f5c080; color: #a06000; }

  .card-hint {
    font-size: 12px;
    color: #ccc;
    margin-top: 14px;
    text-align: center;
  }

  /* ナビゲーション */
  .card-actions {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-bottom: 10px;
  }
  .nav-actions {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .btn {
    border-radius: 8px;
    padding: 10px 24px;
    font-size: 14px;
    cursor: pointer;
    font-family: inherit;
    border: none;
  }
  .btn-primary { background: #1a6ef7; color: #fff; font-weight: 500; }
  .btn-primary:hover { background: #155dd4; }
  .btn-outline { background: #fff; color: #555; border: 1px solid #d0d0cc; }
  .btn-outline:hover { background: #f5f5f3; }
  .btn-sm { padding: 7px 16px; font-size: 13px; }

  /* 完了 */
  .done-section {
    display: none;
    background: #fff;
    border-radius: 12px;
    border: 1px solid #e0e0dc;
    padding: 2rem;
    text-align: center;
  }
  .done-section.show { display: block; }
  .done-icon { font-size: 40px; margin-bottom: 12px; }
  .done-title { font-size: 18px; font-weight: 500; margin-bottom: 8px; }
  .done-sub { font-size: 14px; color: #888; margin-bottom: 1.5rem; }
</style>
</head>
<body>
<div class="container">
  <h1>単語帳</h1>

  <div class="hint-box">
    📋 Excelファイルの形式：<strong>A列＝英語　B列＝日本語　C列＝例文（英語）</strong><br>
    1行目は見出し行でもOK。C列の例文は省略可。
  </div>

  <div class="upload-area" id="upload-area" onclick="document.getElementById('file-input').click()">
    <div class="upload-icon">📂</div>
    <div class="upload-text">
      <strong>クリックしてExcelファイルを選択</strong><br>
      またはここにファイルをドラッグ＆ドロップ<br>
      <span style="font-size:12px;color:#bbb;">（.xlsx / .xls 対応）</span>
    </div>
    <input type="file" id="file-input" accept=".xlsx,.xls" onchange="loadFile(event)">
  </div>

  <div class="status-bar" id="status-bar">
    <span id="status-text">読み込み中…</span>
    <span class="word-count" id="word-count"></span>
  </div>

  <div class="card-section" id="card-section">
    <div class="progress-text" id="progress-text"></div>

    <div class="flashcard" id="flashcard" onclick="flipCard()">
      <div class="card-side-label" id="side-label">英語</div>
      <div class="card-word" id="card-word"></div>
      <div class="card-meaning" id="card-meaning"></div>
      <hr class="divider" id="divider">
      <div class="card-sentence-wrap" id="sentence-wrap">
        <div class="card-sentence" id="card-sentence"></div>
        <button class="btn-speak" id="btn-speak" onclick="speakSentence(event)">
          <span>🔊</span><span id="speak-label">例文を読み上げる</span>
        </button>
      </div>
      <div class="card-hint" id="card-hint">タップで日本語・例文を表示</div>
    </div>

    <div class="card-actions">
      <button class="btn btn-outline btn-sm" onclick="prevCard()">◀ 前へ</button>
      <button class="btn btn-primary btn-sm" onclick="nextCard()">次へ ▶</button>
    </div>
    <div class="nav-actions">
      <button class="btn btn-outline btn-sm" onclick="shuffle()">🔀 シャッフル</button>
      <button class="btn btn-outline btn-sm" onclick="restart()">↩ 最初から</button>
      <button class="btn btn-outline btn-sm" onclick="reloadFile()">📂 ファイル変更</button>
    </div>
  </div>

  <div class="done-section" id="done-section">
    <div class="done-icon">🎉</div>
    <div class="done-title">すべての単語を確認しました！</div>
    <div class="done-sub" id="done-sub"></div>
    <div style="display:flex;gap:10px;justify-content:center;">
      <button class="btn btn-primary" onclick="restart()">↩ もう一度</button>
      <button class="btn btn-outline" onclick="shuffle()">🔀 シャッフルして再挑戦</button>
    </div>
  </div>
</div>

<script>
  let words = [];
  let current = 0;
  let flipped = false;

  const uploadArea = document.getElementById('upload-area');
  uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('dragover'); });
  uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
  uploadArea.addEventListener('drop', e => {
    e.preventDefault();
    uploadArea.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (file) processFile(file);
  });

  function loadFile(event) {
    const file = event.target.files[0];
    if (file) processFile(file);
  }

  function processFile(file) {
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const wb = XLSX.read(e.target.result, { type: 'binary' });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, { header: 1 });

        words = [];
        for (let i = 0; i < rows.length; i++) {
          const row = rows[i];
          const en  = (row[0] || '').toString().trim();
          const ja  = (row[1] || '').toString().trim();
          const ex  = (row[2] || '').toString().trim();
          if (!en || !ja) continue;
          if (i === 0 && (en === '英語' || en.toLowerCase() === 'english' || en.toLowerCase() === 'word')) continue;
          words.push({ en, ja, ex });
        }

        if (words.length === 0) {
          alert('単語が見つかりませんでした。\nA列に英語、B列に日本語が入っているか確認してください。');
          return;
        }

        uploadArea.style.display = 'none';
        document.getElementById('status-bar').classList.add('show');
        document.getElementById('status-text').textContent = `「${file.name}」を読み込みました`;
        document.getElementById('word-count').textContent = `${words.length} 単語`;
        current = 0;
        showCard();
        document.getElementById('card-section').classList.add('show');
        document.getElementById('done-section').classList.remove('show');
      } catch(err) {
        alert('ファイルの読み込みに失敗しました。\nExcel形式（.xlsx / .xls）を選択してください。');
      }
    };
    reader.readAsBinaryString(file);
  }

  function showCard() {
    speechSynthesis.cancel();
    resetSpeakBtn();

    if (current >= words.length) {
      document.getElementById('card-section').classList.remove('show');
      document.getElementById('done-section').classList.add('show');
      document.getElementById('done-sub').textContent = `${words.length} 単語すべて完了！`;
      return;
    }

    flipped = false;
    const w = words[current];

    document.getElementById('card-word').textContent = w.en;
    document.getElementById('card-meaning').textContent = w.ja;
    document.getElementById('card-meaning').style.display = 'none';
    document.getElementById('divider').style.display = 'none';
    document.getElementById('sentence-wrap').style.display = 'none';
    document.getElementById('card-sentence').textContent = w.ex || '';
    document.getElementById('card-hint').style.display = w.ex ? 'block' : 'block';
    document.getElementById('side-label').textContent = '英語';
    document.getElementById('progress-text').textContent = `${current + 1} / ${words.length}`;

    // 例文なしの場合ヒント文を変える
    document.getElementById('card-hint').textContent = 'タップで日本語' + (w.ex ? '・例文' : '') + 'を表示';
  }

  function flipCard() {
    flipped = !flipped;
    const w = words[current];
    if (flipped) {
      document.getElementById('card-meaning').style.display = 'block';
      document.getElementById('side-label').textContent = '日本語';
      document.getElementById('card-hint').style.display = 'none';
      if (w.ex) {
        document.getElementById('divider').style.display = 'block';
        document.getElementById('sentence-wrap').style.display = 'block';
      }
    } else {
      document.getElementById('card-meaning').style.display = 'none';
      document.getElementById('divider').style.display = 'none';
      document.getElementById('sentence-wrap').style.display = 'none';
      document.getElementById('card-hint').style.display = 'block';
      document.getElementById('side-label').textContent = '英語';
      speechSynthesis.cancel();
      resetSpeakBtn();
    }
  }

  function speakSentence(e) {
    e.stopPropagation();
    const sentence = words[current].ex;
    if (!sentence) return;

    const btn = document.getElementById('btn-speak');
    const label = document.getElementById('speak-label');

    if (speechSynthesis.speaking) {
      speechSynthesis.cancel();
      resetSpeakBtn();
      return;
    }

    const utt = new SpeechSynthesisUtterance(sentence);
    utt.lang = 'en-US';
    utt.rate = 0.9;
    utt.onstart = () => {
      btn.classList.add('playing');
      label.textContent = '停止';
    };
    utt.onend = () => resetSpeakBtn();
    utt.onerror = () => resetSpeakBtn();
    speechSynthesis.speak(utt);
  }

  function resetSpeakBtn() {
    const btn = document.getElementById('btn-speak');
    const label = document.getElementById('speak-label');
    if (btn) btn.classList.remove('playing');
    if (label) label.textContent = '例文を読み上げる';
  }

  function nextCard() { current++; showCard(); }
  function prevCard() { if (current > 0) { current--; showCard(); } }

  function shuffle() {
    speechSynthesis.cancel();
    for (let i = words.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [words[i], words[j]] = [words[j], words[i]];
    }
    current = 0;
    showCard();
    document.getElementById('card-section').classList.add('show');
    document.getElementById('done-section').classList.remove('show');
  }

  function restart() {
    speechSynthesis.cancel();
    current = 0;
    showCard();
    document.getElementById('card-section').classList.add('show');
    document.getElementById('done-section').classList.remove('show');
  }

  function reloadFile() {
    speechSynthesis.cancel();
    uploadArea.style.display = '';
    document.getElementById('status-bar').classList.remove('show');
    document.getElementById('card-section').classList.remove('show');
    document.getElementById('done-section').classList.remove('show');
    document.getElementById('file-input').value = '';
    words = [];
  }
</script>
</body>
</html>
